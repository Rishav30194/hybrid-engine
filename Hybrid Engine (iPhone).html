  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#7C828B;margin-top:3px;\">{{ d.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:11px;flex:0 0 auto;\">\n                <span style=\"font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;color:{{ d.progColor }};\">{{ d.progress }}<\u002Fspan>\n                <span style=\"color:#7C828B;font-size:13px;\">{{ d.caret }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fbutton>\n            <sc-if value=\"{{ d.open }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:0 12px 12px;\">\n                <sc-for list=\"{{ d.exercises }}\" as=\"e\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-top:1px solid rgba(255,255,255,0.06);\">\n                    <button onclick=\"{{ e.toggle }}\" style=\"flex:0 0 auto;margin-top:1px;width:26px;height:26px;border-radius:8px;border:1.5px solid {{ e.checkBorder }};background:{{ e.checkBg }};color:#0C0D0F;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;\">{{ e.check }}<\u002Fbutton>\n                    <div style=\"flex:1;min-width:0;\">\n                      <div style=\"display:flex;justify-content:space-between;gap:10px;align-items:center;\">\n                        <span style=\"font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;color:#EDEFF1;\">{{ e.name }}<\u002Fspan>\n                        <sc-if value=\"{{ e.isMain }}\" hint-placeholder-val=\"{{ true }}\">\n                          <span style=\"flex:0 0 auto;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;color:{{ e.loadColor }};\">{{ e.load }}<\u002Fspan>\n                        <\u002Fsc-if>\n                        <sc-if value=\"{{ e.isInput }}\" hint-placeholder-val=\"{{ false }}\">\n                          <input type=\"text\" inputmode=\"decimal\" value=\"{{ e.logValue }}\" oninput=\"{{ e.onLog }}\" placeholder=\"{{ e.placeholder }}\" style=\"flex:0 0 auto;width:98px;text-align:right;background:#0E1014;border:1px solid rgba(255,255,255,0.14);border-radius:7px;color:var(--accent,#D7FF3E);font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;padding:5px 8px;outline:none;\">\n                        <\u002Fsc-if>\n                      <\u002Fdiv>\n                      <div style=\"font-size:12px;color:#8A9097;margin-top:3px;\">{{ e.meta }}<\u002Fdiv>\n                      <div style=\"font-size:11.5px;color:#666C74;margin-top:2px;line-height:1.4;\">{{ e.note }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"display:flex;align-items:flex-start;gap:11px;padding:12px;margin-top:11px;border:1px dashed rgba(255,255,255,0.16);border-radius:11px;background:rgba(255,255,255,0.03);\">\n                  <button onclick=\"{{ d.cond.toggle }}\" style=\"flex:0 0 auto;margin-top:1px;width:26px;height:26px;border-radius:8px;border:1.5px solid {{ d.cond.checkBorder }};background:{{ d.cond.checkBg }};color:#0C0D0F;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;\">{{ d.cond.check }}<\u002Fbutton>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent,#D7FF3E);font-weight:700;\">CONDITIONING · {{ d.cond.label }}<\u002Fdiv>\n                    <div style=\"font-size:14px;color:#F2F3F5;margin-top:4px;font-weight:600;\">{{ d.cond.desc }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9298A0;margin-top:5px;line-height:1.5;\">{{ d.cond.how }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n\n    <nav style=\"flex:0 0 auto;background:#0C0D0F;border-top:1px solid rgba(255,255,255,0.08);display:flex;\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.select }}\" style=\"flex:1;padding:10px 4px 14px;background:transparent;border:none;border-top:2px solid {{ t.bar }};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;\">\n          <span style=\"font-size:16px;line-height:1;color:{{ t.color }};\">{{ t.icon }}<\u002Fspan>\n          <span style=\"font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:0.06em;font-weight:600;color:{{ t.color }};\">{{ t.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 430, &quot;height&quot;: 900 },\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#D7FF3E&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot;, &quot;options&quot;: [&quot;#D7FF3E&quot;, &quot;#FF7A1A&quot;, &quot;#35D6FF&quot;, &quot;#FF4D8D&quot;] },\n  &quot;showPercents&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot; },\n  &quot;bigLoad&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    tab: \"week\",\n    week: 1,\n    rounding: 5,\n    rm: { squat: 245, bench: 225, tbdl: 375, ohp: 135 },\n    done: {},\n    log: {},\n    openWeek: 0,\n    openDay: 1,\n  };\n\n  LIFTS = [\n    { key: \"squat\", name: \"Back Squat\", abbr: \"SQ\", note: \"Fresh — strength anchor.\" },\n    { key: \"bench\", name: \"Bench Press\", abbr: \"BN\", note: \"Alternate with OHP every 3rd wk.\" },\n    { key: \"tbdl\", name: \"Trap-Bar Deadlift\", abbr: \"DL\", note: \"Posterior-chain anchor.\" },\n    { key: \"ohp\", name: \"Overhead Press\", abbr: \"OHP\", note: \"Swap option for bench.\" },\n  ];\n\n  PHASES = {\n    base:   { color: \"#2DD4BF\", bg: \"rgba(45,212,191,0.13)\",  border: \"rgba(45,212,191,0.40)\" },\n    peak:   { color: \"#FB923C\", bg: \"rgba(251,146,60,0.13)\",  border: \"rgba(251,146,60,0.40)\" },\n    build:  { color: \"#38BDF8\", bg: \"rgba(56,189,248,0.13)\",  border: \"rgba(56,189,248,0.40)\" },\n    deload: { color: \"#A78BFA\", bg: \"rgba(167,139,250,0.13)\", border: \"rgba(167,139,250,0.40)\" },\n    test:   { color: \"#FB7185\", bg: \"rgba(251,113,133,0.13)\", border: \"rgba(251,113,133,0.40)\" },\n  };\n\n  COND = [\n    { key: \"d1\", label: \"Day 1 — Sled Push + Carry\", short: \"Sled+Carry\" },\n    { key: \"d2\", label: \"Day 2 — Intervals\", short: \"Intervals\" },\n    { key: \"d3\", label: \"Day 3 — Zone 2\", short: \"Zone 2\" },\n    { key: \"d4\", label: \"Day 4 — Sled Drag\", short: \"Sled Drag\" },\n    { key: \"d5\", label: \"Day 5 — Finisher\", short: \"Finisher\" },\n  ];\n\n  CONDINFO = {\n    d1: \"Sled push: hard but unbroken ~20 m lengths, walk back = rest (45–60s). Long aggressive steps, drive through the balls of your feet. Then heavy farmer's carries — grip, core & traps in one.\",\n    d2: \"Work : rest intervals. \\\"Hard\\\" = RPE 7–8 (breathing heavily, not an all-out sprint). Keep pedalling / pulling easy through the rest — don't fully stop.\",\n    d3: \"This easy Zone 2 block IS your conditioning. Conversational / nose-breathing pace — it should feel too easy. Chasing intensity here wrecks recovery for Days 4–5.\",\n    d4: \"Alternate backward drag (faces forward, torches quads, knee-friendly) and forward rope drag (row it in, hits the back). Walk back = rest.\",\n    d5: \"Pick ONE, controlled — not a wipe-out:  A) 3 rounds — 250 m row + 10 KB swings + 10 step-ups.  B) 10-min EMOM — odd min 12-cal bike, even min 10 goblet squats.  C) 3 rounds — sled push 2×20 m + 200 m row.\",\n  };\n\n  WEEKS = [\n    { wk: 1, phase: \"base\", tag: \"BLOCK 1 · BASE\", rpe: \"7\",\n      main: { squat: { sr: \"4×5\", rpe: \"7\", pct: .785 }, bench: { sr: \"4×6\", rpe: \"7\", pct: .76 }, tbdl: { sr: \"4×5\", rpe: \"7\", pct: .785 }, ohp: { sr: \"4×6\", rpe: \"7\", pct: .72 } },\n      cond: { d1: \"Sled push 6 × 20m · Farmer's carry 3 × 30m\", d2: \"6 rounds · 20s hard / 70s easy (~9 min)\", d3: \"Zone 2: 12 min easy + light circuit\", d4: \"Sled drag 6 × 20m\", d5: \"Optional / short — finisher not in yet\" } },\n    { wk: 2, phase: \"base\", tag: \"BLOCK 1 · BASE\", rpe: \"7–8\",\n      main: { squat: { sr: \"4×5\", rpe: \"7.5\", pct: .80 }, bench: { sr: \"4×6\", rpe: \"7.5\", pct: .775 }, tbdl: { sr: \"4×5\", rpe: \"7.5\", pct: .80 }, ohp: { sr: \"4×6\", rpe: \"7.5\", pct: .735 } },\n      cond: { d1: \"Sled push 7 × 20m · Farmer's carry 3 × 35m\", d2: \"7 rounds · 20s hard / 70s easy\", d3: \"Zone 2: 13 min easy\", d4: \"Sled drag 7 × 20m\", d5: \"Optional / short finisher\" } },\n    { wk: 3, phase: \"peak\", tag: \"BLOCK 1 · PEAK\", rpe: \"8\",\n      main: { squat: { sr: \"4×5\", rpe: \"8\", pct: .81 }, bench: { sr: \"4×6\", rpe: \"8\", pct: .785 }, tbdl: { sr: \"4×5\", rpe: \"8\", pct: .81 }, ohp: { sr: \"4×6\", rpe: \"8\", pct: .745 } },\n      cond: { d1: \"Sled push 8 × 20m · Farmer's carry 4 × 35m\", d2: \"8 rounds · 20s hard / 70s easy\", d3: \"Zone 2: 15 min easy\", d4: \"Sled drag 8 × 20m\", d5: \"Finisher folds in · 3 rounds\" } },\n    { wk: 4, phase: \"deload\", tag: \"DELOAD WEEK\", rpe: \"5–6\",\n      main: { squat: { sr: \"3×5\", rpe: \"5\", pct: .68 }, bench: { sr: \"3×6\", rpe: \"5\", pct: .66 }, tbdl: { sr: \"3×5\", rpe: \"5\", pct: .68 }, ohp: { sr: \"3×6\", rpe: \"5\", pct: .62 } },\n      cond: { d1: \"Light walk only\", d2: \"Drop intervals\", d3: \"Zone 2 only: 15–20 min easy\", d4: \"Drop sled\", d5: \"Skip finisher\" } },\n    { wk: 5, phase: \"bui        { id: \"d1e0\", name: \"Back Squat\", main: \"squat\", sr: \"4×5→4×4\", rpe: \"7→8\", rest: \"2–3 min\", note: \"Strength anchor — do it fresh. Brace, knees out.\" },\n        { id: \"d1e1\", name: \"A1 · Romanian Deadlift\", sr: \"3×8\", rpe: \"7\", rest: \"—\", load: \"RPE-based\", note: \"Tri-set A1–A3. Hinge, soft knees, hamstring stretch.\" },\n        { id: \"d1e2\", name: \"A2 · DB Walking Lunge\", sr: \"3×10/leg\", rpe: \"7\", rest: \"—\", load: \"RPE-based\", note: \"Long stride, tall torso, push the front heel.\" },\n        { id: \"d1e3\", name: \"A3 · Standing Calf Raise\", sr: \"3×12\", rpe: \"8\", rest: \"75–90s\", load: \"RPE-based\", note: \"Full stretch, 1-sec squeeze top. Calves 2×/wk.\" },\n      ] },\n    { n: 2, title: \"DAY 2 — UPPER\", sub: \"Push / Pull + Intervals\", condLabel: \"Bike / Row Intervals\", condKey: \"d2\",\n      ex: [\n        { id: \"d2e0\", name: \"Barbell Bench Press\", main: \"bench\", sr: \"4×6→4×5\", rpe: \"7→8\", rest: \"2 min\", note: \"Strength anchor. Swap to OHP every 3rd week.\" },\n        { id: \"d2e1\", name: \"A1 · Weighted Pull-up / Pulldown\", sr: \"3×8\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Full hang to chest, elbows down & in.\" },\n        { id: \"d2e2\", name: \"A2 · Standing DB Overhead Press\", sr: \"3×10\", rpe: \"7\", rest: \"75s\", load: \"RPE-based\", note: \"Superset A. Glutes tight, press up & back.\" },\n        { id: \"d2e3\", name: \"B1 · Chest-Supported Row\", sr: \"3×12\", rpe: \"7\", rest: \"—\", load: \"RPE-based\", note: \"Tri-set B1–B3. Squeeze blades, control down.\" },\n        { id: \"d2e4\", name: \"B2 · Push-up\", sr: \"3×AMRAP-2\", rpe: \"8\", rest: \"—\", load: \"bodyweight\", note: \"Stop 2 reps short of failure.\" },\n        { id: \"d2e5\", name: \"B3 · Cable / DB Lateral Raise\", sr: \"3×15\", rpe: \"8\", rest: \"60s\", load: \"RPE-based\", note: \"Side delts. Raise out, not up.\" },\n      ] },\n    { n: 3, title: \"DAY 3 — ENGINE\", sub: \"Zone 2 + Circuit · deliberately EASY\", condLabel: \"Built into Zone 2\", condKey: \"d3\",\n      ex: [\n        { id: \"d3e0\", name: \"Zone 2: Row / Bike / Incline Walk\", sr: \"12–15 min\", rpe: \"4–5\", rest: \"—\", load: \"easy pace\", note: \"Conversational / nose-breathing. The engine base.\" },\n        { id: \"d3e1\", name: \"Goblet Squat\", sr: \"3×15\", rpe: \"6\", rest: \"—\", load: \"light\", note: \"Circuit: 3 rounds, 60s rest between rounds.\" },\n        { id: \"d3e2\", name: \"Push-up\", sr: \"3×12\", rpe: \"6\", rest: \"—\", load: \"bodyweight\", note: \"Crisp full reps.\" },\n        { id: \"d3e3\", name: \"DB / Ring Row\", sr: \"3×15\", rpe: \"6\", rest: \"—\", load: \"light\", note: \"Squeeze the back, no jerk.\" },\n        { id: \"d3e4\", name: \"Kettlebell Swing\", sr: \"3×20\", rpe: \"6\", rest: \"—\", load: \"moderate\", note: \"Hip snap, glutes drive it.\" },\n        { id: \"d3e5\", name: \"Plank\", sr: \"3×40s\", rpe: \"—\", rest: \"60s\", load: \"bodyweight\", note: \"Ribs down, glutes tight, breathe.\" },\n      ] },\n    { n: 4, title: \"DAY 4 — LOWER\", sub: \"Strength + Sled Drag\", condLabel: \"Sled Drag\", condKey: \"d4\",\n      ex: [\n        { id: \"d4e0\", name: \"Trap-Bar Deadlift\", main: \"tbdl\", sr: \"4×5→4×4\", rpe: \"7→8\", rest: \"2–3 min\", note: \"Posterior-chain anchor. Chest tall, push floor away.\" },\n        { id: \"d4e1\", name: \"A1 · Bulgarian Split Squat\", sr: \"3×8/leg\", rpe: \"7\", rest: \"—\", load: \"RPE-based\", note: \"Tri-set A1–A3. Drop straight down, drive front heel.\" },\n        { id: \"d4e2\", name: \"A2 · Seated / Lying Leg Curl\", sr: \"3×12\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Squeeze hams, slow return.\" },\n        { id: \"d4e3\", name: \"A3 · Hanging Leg Raise\", sr: \"3×12\", rpe: \"7\", rest: \"75s\", load: \"bodyweight\", note: \"Direct core. Roll hips up, don't swing.\" },\n      ] },\n    { n: 5, title: \"DAY 5 — UPPER PUMP\", sub: \"Pump + Mixed-Modal Finisher\", condLabel: \"Mixed-Modal Finisher\", condKey: \"d5\",\n      ex: [\n        { id: \"d5e0\", name: \"A1 · Incline DB Press\", sr: \"3×12\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Stretch at bottom, squeeze upper chest.\" },\n        { id: \"d5e1\", name: \"A2 · Cable / Chest-Supported Row\", sr: \"3×12\", rpe: \"8\", rest: \"60–75s\", load: \"RPE-based\", note: \"Superset A. Pull to lower ribs.\" },\n        { id: \"d5e2\", name: \"B1 · DB Lateral Raise\", sr: \"3×15\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Tri-set B1–B3. Lead with elbows, out not up.\" },\n        { id: \"d5e3\", name: \"B2 · Lat Pulldown / Pull-up\", sr: \"3×12\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Elbows to back pockets.\" },\n        { id: \"d5e4\", name: \"B3 · Face Pull\", sr: \"3×15\", rpe: \"8\", rest: \"60s\", load: \"RPE-based\", note: \"Rear delts + external rotators.\" },\n        { id: \"d5e5\", name: \"C1 · EZ-Bar Curl\", sr: \"3×12–15\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Tri-set C1–C3. Squeeze top.\" },\n        { id: \"d5e6\", name: \"C2 · Triceps Rope Pressdown\", sr: \"3×15\", rpe: \"8\", rest: \"—\", load: \"RPE-based\", note: \"Elbows pinned, full lockout.\" },\n        { id: \"d5e7\", name: \"C3 · Seated Calf Raise\", sr: \"3×15\", rpe: \"8\", rest: \"45s\", load: \"RPE-based\", note: \"Slow, full range, pause.\" },\n      ] },\n  ];\n\n  NOTES = [\n    \"Loads auto-update from your 1RM and the week's %1RM. Update a 1RM and the whole plan recalculates.\",\n    \"Strength: when the top set feels easier than the listed RPE, bump that lift's 1RM by 5 lb (lower) / 2.5–5 lb (upper).\",\n    \"Conditioning: progress ONE dial at a time — more rounds OR longer work OR heavier sled. Only if last week was repeatable.\",\n    \"Sled load = you can keep moving the whole length unbroken. Stall mid-length → too heavy, strip a plate.\",\n    \"Weeks 4 & 8 are deloads — mandatory. Week 8 can be a test week (log the numbers).\",\n    \"Accessory / superset work is RPE-based by design: pick a load that hits the listed RPE for the reps.\",\n    \"After Week 8: nudge starting 1RMs up ~2.5–5% and repeat the 8-week block.\",\n  ];\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(\"hybridEngine.v1\");\n      if (raw) {\n        const s = JSON.parse(raw);\n        this.setState((st) => ({\n          week: s.week || st.week,\n          rounding: s.rounding || st.rounding,\n          rm: Object.assign({}, st.rm, s.rm || {}),\n          done: s.done || {},\n          log: s.log || {},\n        }));\n      }\n    } catch (e) {}\n  }\n\n  save = () => {\n    try {\n      const { week, rounding, rm, done, log } = this.state;\n      localStorage.setItem(\"hybridEngine.v1\", JSON.stringify({ week, rounding, rm, done, log }));\n    } catch (e) {}\n  };\n\n  toNum = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };\n\n  roundLoad = (v, pct) => {\n    const r = this.toNum(this.state.rounding) || 1;\n    return Math.round((this.toNum(v) * pct) / r) * r;\n  };\n\n  setWeek = (w) => this.setState({ week: w }, this.save);\n  setTab = (t) => this.setState({ tab: t });\n  setRounding = (e) => this.setState({ rounding: this.toNum(e.target.value) || 1 }, this.save);\n  setRm = (k, v) => this.setState((st) => ({ rm: Object.assign({}, st.rm, { [k]: v === \"\" ? \"\" : this.toNum(v) }) }), this.save);\n  setLog = (id, v) => this.setState((st) => ({ log: Object.assign({}, st.log, { [id]: v }) }), this.save);\n  toggleDone = (id) => this.setState((st) => { const d = Object.assign({}, st.done); d[id] = !d[id]; return { done: d }; }, this.save);\n  toggleWeek = (w) => this.setState((st) => ({ openWeek: st.openWeek === w ? 0 : w }));\n  toggleDay = (n) => this.setState((st) => ({ openDay: st.openDay === n ? 0 : n }));\n\n  chk(on) {\n    return {\n      check: on ? \"✓\" : \"\",\n      checkBg: on ? \"var(--accent,#D7FF3E)\" : \"transparent\",\n      checkBorder: on ? \"var(--accent,#D7FF3E)\" : \"rgba(255,255,255,0.22)\",\n    };\n  }\n\n  renderVals() {\n    const st = this.state;\n    const week = st.week;\n    const cw = this.WEEKS[week - 1];\n    const ph = this.PHASES[cw.phase];\n    const showPct = this.props.showPercents ?? true;\n    const accentHex = this.props.accentColor ?? \"#D7FF3E\";\n\n    const mainLifts = this.LIFTS.map((l) => {\n      const m = cw.main[l.key];\n      const id = \"w\" + week + \":m:\" + l.key;\n      let meta = m.sr + \" · RPE \" + m.rpe;\n      if (showPct) meta += \" · \" + Math.round(m.pct * 100) + \"%\";\n      return Object.assign({\n        key: l.key, name: l.name, load: String(this.roundLoad(st.rm[l.key], m.pct)),\n        meta, note: l.note, toggle: () => this.toggleDone(id),\n      }, this.chk(!!st.done[id]));\n    });\n\n    const conditioning = this.COND.map((c) => {\n      const id = \"w\" + week + \":c:\" + c.key;\n      return Object.assign({\n        label: c.label, desc: cw.cond[c.key], how: this.CONDINFO[c.key], toggle: () => this.toggleDone(id),\n      }, this.chk(!!st.done[id]));\n    });\n\n    const weekChips = this.WEEKS.map((w) => {\n      const active = w.wk === week;\n      const color = this.PHASES[w.phase].color;\n      return {\n        label: \"W\" + w.wk, color, dot: color,\n        bg: active ? accentHex : \"#15171B\",\n        fg: active ? \"#0C0D0F\" : \"#C7CCD2\",\n        border: active ? accentHex : \"rgba(255,255,255,0.10)\",\n        select: () => this.setWeek(w.wk),\n      };\n    });\n\n    const maxesList = this.LIFTS.map((l) => ({\n      name: l.name, value: st.rm[l.key], onInput: (e) => this.setRm(l.key, e.target.value),\n    }));\n\n    const weeksList = this.WEEKS.map((w) => {\n      const active = w.wk === week;\n      const p = this.PHASES[w.phase];\n      const open = st.openWeek === w.wk;\n      return {\n        wkLabel: \"W\" + w.wk, tag: w.tag, rpe: w.rpe, color: p.color, bg: p.bg,\n        cardBg: active ? \"linear-gradient(135deg,#1A1D22,#121419)\" : \"#121419\",\n        cardBorder: active ? accentHex : \"rgba(255,255,255,0.08)\",\n        cta: active ? \"var(--accent,#D7FF3E)\" : \"#6C727A\",\n        ctaText: active ? \"● ACTIVE\" : \"SET ACTIVE\",\n        loads: this.LIFTS.map((l) => ({ abbr: l.abbr, load: String(this.roundLoad(st.rm[l.key], w.main[l.key].pct)) })),\n        cond: this.COND.map((c) => ({ label: c.short, desc: w.cond[c.key] })),\n        open, condToggleText: open ? \"Hide conditioning ▲\" : \"Show conditioning ▾\",\n        select: () => this.setWeek(w.wk), toggleOpen: () => this.toggleWeek(w.wk),\n      };\n    });\n\n    const tmplDays = this.DAYS.map((d) => {\n      const exercises = d.ex.map((e) => {\n        const id = \"w\" + week + \":t:\" + e.id;\n        const isMain = !!e.main;\n        let load = e.load;\n        if (isMain) load = this.roundLoad(st.rm[e.main], cw.main[e.main].pct) + \" lb\";\n        let meta = e.sr + \" · RPE \" + e.rpe;\n        if (e.rest && e.rest !== \"—\") meta += \" · rest \" + e.rest;\n        return Object.assign({\n          name: e.name, load: String(load), meta, note: e.note,\n          loadColor: isMain ? \"var(--accent,#D7FF3E)\" : \"#9AA0A8\",\n          isMain: isMain, isInput: !isMain,\n          logValue: st.log[id] || \"\", placeholder: e.load,\n          onLog: (ev) => this.setLog(id, ev.target.value),\n          toggle: () => this.toggleDone(id),\n        }, this.chk(!!st.done[id]));\n      });\n      const cid = \"w\" + week + \":tc:\" + d.condKey;\n      const cond = Object.assign({\n        label: d.condLabel, desc: cw.cond[d.condKey], how: this.CONDINFO[d.condKey], toggle: () => this.toggleDone(cid),\n      }, this.chk(!!st.done[cid]));\n      const total = exercises.length + 1;\n      const doneCount = exercises.filter((x) => x.check === \"✓\").length + (cond.check === \"✓\" ? 1 : 0);\n      const complete = doneCount === total;\n      const open = st.openDay === d.n;\n      return {\n        n: d.n, title: d.title, sub: d.sub, exercises, cond,\n        progress: doneCount + \"/\" + total, complete, open,\n        caret: open ? \"▲\" : \"▾\",\n        progColor: complete ? \"var(--accent,#D7FF3E)\" : \"#7C828B\",\n        border: complete ? accentHex : (open ? \"rgba(255,255,255,0.14)\" : \"rgba(255,255,255,0.08)\"),\n        toggleOpen: () => this.toggleDay(d.n),\n      };\n    });\n\n    const tabs = [\n      { key: \"week\", label: \"THIS WEEK\", icon: \"◉\" },\n      { key: \"plan\", label: \"8-WEEK\", icon: \"▦\" },\n      { key: \"template\", label: \"TEMPLATE\", icon: \"≣\" },\n    ].map((t) => ({\n      label: t.label, icon: t.icon, select: () => this.setTab(t.key),\n      color: st.tab === t.key ? \"var(--accent,#D7FF3E)\" : \"#6C727A\",\n      bar: st.tab === t.key ? \"var(--accent,#D7FF3E)\" : \"transparent\",\n    }));\n\n    return {\n      accent: this.props.accentColor ?? \"#D7FF3E\",\n      loadSize: (this.props.bigLoad ?? false) ? \"52px\" : \"40px\",\n      weekTitle: \"WEEK \" + week, weekRpe: cw.rpe, phaseTag: cw.tag,\n      phaseColor: ph.color, phaseBg: ph.bg, phaseBorder: ph.border,\n      weekChips, maxesList, rounding: st.rounding, onRounding: this.setRounding,\n      mainLifts, conditioning,\n      isWeek: st.tab === \"week\", isPlan: st.tab === \"plan\", isTemplate: st.tab === \"template\",\n      weeksList, notes: this.NOTES.map((t) => ({ text: t })), tmplDays, tabs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
